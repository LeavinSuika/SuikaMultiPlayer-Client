name-template: 'v$RESOLVED_VERSION'
tag-template: '$RESOLVED_VERSION'

categories:
  - title: '🚀 新功能'
    labels:
      - 'feat'
      - 'feature'
      - 'enhancement'
  - title: '🐛 修复'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '🧹 维护'
    label: 'chore'
  - type: 'pre-exclude'
    when:
      label: 'skip-changelog'

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'

template: |
  ## 🎉 更新内容
  $CHANGES
