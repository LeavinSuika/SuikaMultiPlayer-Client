name: suika_multi_player
description: "A multiplayer music listening client"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  web_socket_channel: ^3.0.1
  media_kit: ^1.2.0
  media_kit_libs_windows_audio: ^1.0.9
  go_router: ^14.8.1
  shared_preferences: ^2.3.4
  window_manager: ^0.4.3
  intl: ^0.19.0
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  scrollable_positioned_list: ^0.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  fonts:
    - family: MiSans
      fonts:
        - asset: assets/fonts/MiSans-Regular.otf
          weight: 400
